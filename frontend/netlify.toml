[build]
  command = "npm run build"
  publish = "dist/nombre-proyecto/browser"

[build.environment]
  NODE_VERSION = "20"

# ⚠️ NO agregar [[redirects]] con "/* /index.html 200" aquí.
# @netlify/angular-runtime crea Edge Functions automáticamente que
# manejan el SSR routing. El fallback SPA rompería SSR al interceptar
# las requests antes de que lleguen a la Edge Function.
