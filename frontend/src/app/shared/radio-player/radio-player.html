<div class="radio-player">
  <div class="radio-player__left">
    <button
      type="button"
      class="radio-player__btn"
      (click)="togglePlay()"
      [attr.aria-label]="(isPlaying$ | async) ? 'Pausar radio' : 'Reproducir radio'"
    >
      <ng-container *ngIf="(isPlaying$ | async); else playIcon">
        <!-- Icono pausa -->
        ❚❚
      </ng-container>
      <ng-template #playIcon>
        <!-- Icono play -->
        ▶
      </ng-template>
    </button>

    <div class="radio-player__info">
      <div class="radio-player__title">Tu Radio</div>
      <div class="radio-player__subtitle">En vivo 24/7 desde MásLatino</div>
    </div>
  </div>

  <div class="radio-player__right">
    <span class="radio-player__volume-label">Vol</span>
    <input
      type="range"
      min="0"
      max="1"
      step="0.01"
      (input)="onVolumeChange($event)"
    />
  </div>
</div>
