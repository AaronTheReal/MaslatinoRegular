<ng-container *ngIf="audioPlayer.isOpen()">
  <div class="audio-floating-player">
    <div class="audio-floating-top">
      <div class="audio-header-copy">
        <p>{{ audioPlayer.podcastTitle() }}</p>
        <span class="audio-subtitle">{{ audioPlayer.title() }}</span>
      </div>

      <div class="audio-actions">
        <button
          class="audio-nav-btn"
          (click)="previousEpisode()"
          [disabled]="!audioPlayer.hasPrevious()"
          aria-label="Episodio anterior"
        >
          ←
        </button>

        <button
          class="audio-nav-btn"
          (click)="nextEpisode()"
          [disabled]="!audioPlayer.hasNext()"
          aria-label="Siguiente episodio"
        >
          →
        </button>

        <button class="audio-close-btn" (click)="closePlayer()" aria-label="Cerrar player">✕</button>
      </div>
    </div>

    <div class="audio-floating-body">
      <div class="audio-floating-art">
        <img
          [src]="audioPlayer.image() || fallbackImage"
          [alt]="audioPlayer.title() || 'Audio'"
        />
      </div>

      <div class="audio-floating-content">
        <div class="audio-floating-player-shell">
          <mux-player
            *ngIf="audioPlayer.playbackId()"
            class="mux-player audio-mux"
            [playbackId]="audioPlayer.playbackId()"
            [attr.playback-token]="audioPlayer.playbackToken() || null"
            stream-type="on-demand"
            theme="minimal"
            accent-color="#a855f7"
            primary-color="#ffffff"
            secondary-color="rgba(20, 20, 20, 0.96)"
            [title]="audioPlayer.title() || ''"
            [start-time]="audioPlayer.resumeTime() || 0"
            forward-seek-offset="15"
            backward-seek-offset="10"
            controls
            audio
            autoplay
            (ended)="nextEpisode()"
          ></mux-player>
        </div>

        <p class="audio-next-hint" *ngIf="audioPlayer.nextTrack()">
          Siguiente: {{ audioPlayer.nextTrack()?.title }}
        </p>
      </div>
    </div>
  </div>
</ng-container>
