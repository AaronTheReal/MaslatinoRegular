<!-- Backdrop -->
<div class="overlay-backdrop" [class.active]="open" (click)="close()">
  <div #panel class="overlay-content" (click)="$event.stopPropagation()">

    <!-- SEARCH BAR -->
    <div class="search-section">
      <div class="search-bar">
        <svg class="search-icon" width="25" height="26" viewBox="0 0 25 26" fill="none">
          <path d="M15.9707 16.4993C12.7357 19.4533 7.7007 19.2263 4.7467 15.9913C1.7917 12.7563 2.0207 7.72133 5.2547 4.76733C8.4897 1.81234 13.5247 2.04033 16.4787 5.27533C19.4337 8.51033 19.2057 13.5453 15.9707 16.4993ZM18.4677 3.45933C14.3787 -1.01767 7.3137 -1.19367 3.0107 3.19133C-0.8083 7.08233 -1.0203 13.4003 2.5247 17.5433C5.7817 21.3503 11.1097 22.2613 15.3537 20.1463C16.2107 19.7193 17.2417 19.8883 17.8877 20.5953L22.1897 25.3053C22.6647 25.8253 23.4717 25.9573 24.0367 25.5363C24.6857 25.0523 24.7627 24.1283 24.2297 23.5453L19.8767 18.7793C19.2297 18.0703 19.1587 17.0263 19.6617 16.2093C22.0897 12.2703 21.7397 7.04134 18.4677 3.45933Z" fill="black"/>
        </svg>

        <input #searchInput
               type="text"
               class="search-input"
               placeholder="Buscar noticias o podcasts..."
               [(ngModel)]="query"
               (input)="onQueryChange()"
               autocomplete="off"
               aria-label="Buscar" />
      </div>

      <button class="categorias-btn" (click)="openFilterModal()">Categorías</button>
    </div>

    <!-- LOADING SKELETON -->
    <div class="overlay-results" *ngIf="loading">
      <div class="results-count">Cargando...</div>
      <div class="results-list">
        <div class="result-item skeleton" *ngFor="let _ of [1,2,3,4,5]">
          <div class="skeleton-img"></div>
          <div class="skeleton-text">
            <div class="skeleton-line long"></div>
            <div class="skeleton-line short"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- RESULTADOS -->
    <div class="overlay-results" *ngIf="!loading && filtered.length > 0">
      <div class="results-count">{{ filtered.length }} resultados</div>
      <ul class="results-list">
        <li *ngFor="let item of filtered; let i = index"
            [id]="'result-' + i"
            class="result-item"
            [class.highlighted]="i === highlightedIndex"
            (click)="pick(item)">
          <img [src]="item.image || 'assets/default.jpg'"
               [alt]="item.title"
               class="item-img"
               loading="lazy" />

          <div class="item-content">
            <div class="item-title">{{ item.title }}</div>
            <div class="item-meta">
              <span class="type-badge"
                    [style.background-color]="item.type === 'noticia' ? '#FF0400' : '#9B43FF'">
                {{ item.type === 'noticia' ? 'Noticia' : 'Podcast' }}
              </span>
              <span *ngIf="item.category"
                    class="cat-badge"
                    [style.background-color]="item.category!.color || '#999'">
                {{ item.category!.name }}
              </span>
            </div>
          </div>
        </li>
      </ul>
    </div>

    <!-- SIN RESULTADOS -->
    <div class="overlay-results" *ngIf="!loading && filtered.length === 0 && query">
      <p class="no-results">No se encontraron resultados para "{{ query }}"</p>
    </div>

  </div>
</div>

<!-- MODAL DE FILTROS -->
<div class="filter-modal-backdrop" [class.active]="isFilterOpen" (click)="closeFilterModal()">
  <div class="filter-modal" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h3>Filtrar búsqueda</h3>
      <button class="close-btn" (click)="closeFilterModal()">✕</button>
    </div>

    <!-- TIPO -->
    <div class="filter-group">
      <label>Tipo de contenido</label>
      <div class="checkbox-group">
        <label>
          <input type="checkbox" [(ngModel)]="filters.noticias" (change)="applyFilters()">
          <span class="check"></span> Noticias
        </label>
        <label>
          <input type="checkbox" [(ngModel)]="filters.podcasts" (change)="applyFilters()">
          <span class="check"></span> Podcasts
        </label>
      </div>
    </div>

    <!-- CATEGORÍAS -->
    <div class="filter-group">
      <label>Categorías</label>
      <div class="categories-grid">
        <button *ngFor="let cat of categorias; trackBy: trackByCatId"
                class="cat-btn"
                [class.active]="selectedCats.includes(cat._id || '')"
                [style.background-color]="selectedCats.includes(cat._id || '') ? (cat.color || '#111') : '#f0f0f0'"
                [style.color]="selectedCats.includes(cat._id || '') ? '#fff' : '#333'"
                [disabled]="!cat._id"
                (click)="toggleCat(cat._id)">
          {{ cat.name }}
        </button>
      </div>
    </div>

    <div class="modal-actions">
      <button class="reset-btn" (click)="resetFilters()">Limpiar</button>
      <button class="apply-btn" (click)="closeFilterModal()">Aplicar</button>
    </div>
  </div>
</div>
