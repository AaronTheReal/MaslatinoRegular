<section class="boston-hero">
  <div class="boston-hero__bg" aria-hidden="true">
    <div class="boston-hero__bg-image"></div>
    <div class="boston-hero__bg-overlay"></div>
    <div class="boston-hero__bg-fade"></div>
  </div>

  <div class="boston-hero__content">
    <header class="boston-hero__header">
      <h1 class="boston-hero__title">
        ¿Qué esta pasando<br />
        en <span>BOSTON?</span>
      </h1>
    </header>

    <div class="boston-hero__stats">
      <article class="stat-card">
        <p class="stat-card__label">CLIMA</p>
        <div class="stat-card__icon"></div>
        <p class="stat-card__value">--°</p>
      </article>

      <article class="stat-card">
        <p class="stat-card__label">SE SIENTE</p>
        <div class="stat-card__icon"></div>
        <p class="stat-card__value">--</p>
      </article>

      <article class="stat-card">
        <p class="stat-card__label">PROBABILIDAD<br />DE LLUVIA</p>
        <div class="stat-card__icon"></div>
        <p class="stat-card__value">--%</p>
      </article>
    </div>
  </div>
</section>
