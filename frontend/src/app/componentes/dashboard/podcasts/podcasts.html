<main class="podcast-section">
  <!-- PODCASTS BLOCK -->
  <div class="podcast-container">
    <h2 class="section-title">PODCAST</h2>

    <p class="section-subtitle">
      Programas que informan, inspiran y acompañan tu día.<br>
      Encuentra el podcast que va contigo.
    </p>

    <!-- Estado de carga / error -->
    <div *ngIf="loading || errorMessage" class="status-block">
      <div *ngIf="loading">
        <p class="status-loading-text">Cargando podcasts...</p>
      </div>
      <div *ngIf="!loading && errorMessage">
        <p class="status-error-text">{{ errorMessage }}</p>
      </div>
    </div>

    <!-- Carrusel dinámico -->
    <div class="podcast-carousel" *ngIf="!loading && !errorMessage">
      <button
        class="carousel-arrow carousel-arrow-previous"
        type="button"
        aria-label="Ver podcast anterior"
        (click)="onPrevious()"
        [disabled]="!canNavigate"
      >
        <span aria-hidden="true">&#10094;</span>
      </button>

      <div class="carousel-viewport">
        <div
          class="podcast-cards"
          role="list"
          aria-live="polite"
          [ngStyle]="{'--active-index': currentIndex}"
        >
          <div *ngFor="let p of podcastsLimited(); let idx = index; trackBy: trackById"
               class="podcast-card"
               role="listitem"
               [ngClass]="getSizeClass(idx)"
               [class.podcast-card-active]="currentIndex === idx"
               [attr.aria-label]="getSlideAriaLabel(idx)"
               (click)="onOpenShow($event, p)">

            <div class="card-container">
              <div class="card-image-wrapper">
                <img
                  class="card-image"
                  [src]="getCover(p)"
                  [alt]="getTitle(p)"
                  loading="lazy"
                />

                <!-- BANDA PRÓXIMAMENTE 
                <div *ngIf="isComingSoon(idx)" class="badge-coming-soon">
                  <span>PRÓXIMAMENTE</span>
                </div>
                -->
              </div>

              <button
                class="play-button"
                aria-label="Reproducir podcast"
                type="button"
                (click)="onPlay(p, $event)"
              >
                <svg
                  [attr.width]="getPlaySize(idx)"
                  [attr.height]="getPlaySize(idx)"
                  [attr.viewBox]="getPlayViewBox(idx)"
                  fill="none"
                >
                  <circle
                    [attr.cx]="getPlayRadius(idx)"
                    [attr.cy]="getPlayRadius(idx)"
                    [attr.r]="getPlayRadius(idx)"
                    fill="rgba(255,255,255,0.3)"
                  />
                  <path [attr.d]="getPlayPath(idx)" fill="white" />
                </svg>
              </button>
            </div>

            <h3 class="card-title">{{ getTitle(p) }}</h3>
          </div>

        </div>
      </div>

      <button
        class="carousel-arrow carousel-arrow-next"
        type="button"
        aria-label="Ver podcast siguiente"
        (click)="onNext()"
        [disabled]="!canNavigate"
      >
        <span aria-hidden="true">&#10095;</span>
      </button>
    </div>

    <!-- CTA -->
    <button class="cta-button" [routerLink]="['/podcast-show']" type="button">
      ver más
    </button>
  </div>
</main>

<router-outlet />
