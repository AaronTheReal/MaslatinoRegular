<!-- Contenedor principal del hero -->
<main class="container">
  <section class="content-wrapper">
    <!-- Lado izquierdo: texto -->
    <div class="text-section">
      <h1 class="main-heading">
        CONECTATE<br />
        CON TUS<br />
        <span class="highlight">RAÍCES<br />LATINAS</span>
      </h1>

      <p class="description">
Explora contenido auténtico que representa quiénes somos y hacia dónde vamos.
      </p>
    </div>



<div class="features-wrapper">
  <div class="features-grid solo-imagenes">
    <!-- Izquierda: micrófono (alto, ocupa 2 filas) -->
    <img
      class="slot mic"
      src="assets/conectarraices/microfono.png"
      alt="Podcast"
      width="2144"
      height="2298"
      decoding="async"
    />

    <!-- Arriba derecha: calendario (medio alto) -->
    <img
      class="slot calendar"
      src="assets/conectarraices/calendario.png"
      alt="Calendario"
      width="2151"
      height="1356"
      decoding="async"
    />

    <!-- Abajo izquierda: noticias (medio alto) -->
    <img
      class="slot news"
      src="assets/conectarraices/noticia.png"
      alt="Noticias"
      width="2153"
      height="1316"
      decoding="async"
    />

    <!-- Derecha abajo (alto, ocupa 2 filas): megáfono -->
    <img
      class="slot megaphone"
      src="assets/conectarraices/megaphono.png"
      alt="Anuncios"
      width="2257"
      height="2226"
      decoding="async"
    />
  </div>
</div>




  

  </section>

  <!-- CTA -->
  <button
    class="cta-button"
    [routerLink]="['/descarga-la-app']"
    type="button"
    (click)="onDescargarApp()"
    aria-label="Descargar la app de Más Latino"
  >
    DESCARGA LA APP
    <span class="button-tail"></span>
  </button>
</main>
