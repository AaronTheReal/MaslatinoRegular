<br>
<div class="publicidad-carousel" #carousel
     (mousedown)="startDrag($event)"
     (mousemove)="drag($event)"
     (mouseup)="endDrag()"
     (mouseleave)="endDrag()"
     (touchstart)="startDrag($event)"
     (touchmove)="drag($event)"
     (touchend)="endDrag()">

  <div class="slider-wrapper">
    <div class="slides-track"
         [style.transition]="transitionStyle"
         [style.transform]="getTransform()">

      <div class="slide" *ngFor="let ad of ads; let i = index">
        <a [href]="ad.link" target="_blank" rel="noopener noreferrer">
          <img
            [src]="ad.image"
            [alt]="ad.alt"
            [width]="ad.w"
            [height]="ad.h"
            [attr.loading]="i === 0 ? 'eager' : 'lazy'"
            [attr.fetchpriority]="i === 0 ? 'high' : null"
            decoding="async"
          >
        </a>
      </div>
    </div>
  </div>

  <!-- Flechas laterales -->
  <button class="nav-arrow left" (click)="prev($event)">‹</button>
  <button class="nav-arrow right" (click)="next($event)">›</button>

  <!-- Indicadores (dots) -->
  <div class="indicators">
    <button 
      *ngFor="let _ of ads; let i = index"
      class="dot"
      [class.active]="i === currentIndex"
      (click)="goTo(i)">
    </button>
  </div>
</div>
