<div class="ad-section">
  <div class="ad-divider"></div>

  <div class="ad-container">
    <a
      [href]="ads[currentIndex].link"
      target="_blank"
      rel="noopener"
      class="ad-link"
    >
      <img
        [src]="ads[currentIndex].image"
        [alt]="ads[currentIndex].alt"
        loading="lazy"
      />
    </a>
  </div>

  <div class="ad-dots">
    <button
      *ngFor="let ad of ads; let i = index"
      type="button"
      class="dot"
      [class.active]="currentIndex === i"
      (click)="goToAd(i)"
      [attr.aria-label]="'Ir a publicidad ' + (i + 1)"
    ></button>
  </div>

  <div class="ad-divider"></div>
</div>
