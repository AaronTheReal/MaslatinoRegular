<div class="login-wrapper">
  <div class="login-card">
    <div class="login-header">
      <h1>Acceso al panel</h1>
      <p>Ingresa tu usuario y contraseña para administrar el contenido.</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="login-form">
      <div class="form-row">
        <label for="email">Correo electrónico</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          placeholder="correo@maslatino.com"
        />
        <div class="error" *ngIf="emailCtrl?.touched && emailCtrl?.invalid">
          <span *ngIf="emailCtrl?.errors?.['required']">
            El correo es obligatorio.
          </span>
          <span *ngIf="emailCtrl?.errors?.['email']">
            El formato del correo no es válido.
          </span>
        </div>
      </div>

      <div class="form-row">
        <label for="password">Contraseña</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          placeholder="••••••••"
        />
        <div class="error" *ngIf="passwordCtrl?.touched && passwordCtrl?.invalid">
          <span *ngIf="passwordCtrl?.errors?.['required']">
            La contraseña es obligatoria.
          </span>
        </div>
      </div>

      <div *ngIf="errorMessage" class="alert alert-error">
        {{ errorMessage }}
      </div>

      <button class="btn-primary" type="submit" [disabled]="loading">
        {{ loading ? 'Ingresando...' : 'Ingresar' }}
      </button>
    </form>

    <p class="login-footnote">
      Sólo para uso interno del equipo de Más Latino.
    </p>
  </div>
</div>
