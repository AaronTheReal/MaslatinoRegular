<section class="hero" [class.is-loading]="!contentReady">
  <!-- Fondo principal -->
  <div
    class="hero-background"
    [style.background-image]="heroBackgroundStyle">
  </div>

  <!-- Skeleton loader -->
  <div class="hero-skeleton" *ngIf="!contentReady" aria-hidden="true">
    <div class="skeleton-layout">
      <div class="skeleton-text-area">
        <div class="skeleton-line skeleton-line-1"></div>
        <div class="skeleton-line skeleton-line-2"></div>
        <div class="skeleton-line skeleton-line-3"></div>
        <div class="skeleton-line skeleton-line-4"></div>
      </div>

      <div class="skeleton-image"></div>
    </div>
  </div>

  <!-- Contenido principal -->
  <div class="content" [class.content-hidden]="!contentReady">
    <div class="text-container">
      <div class="text-overlay">
        <p class="hero-eyebrow">PODCAST</p>
        <h1 class="hero-title">{{ titleText }}</h1>
        <p class="description">
          {{ descriptionText }}
        </p>
      </div>
    </div>

    <div class="image-container">
      <img
        [src]="podcast?.coverImage || 'https://picsum.photos/id/1005/800/800'"
        [alt]="titleText"
        class="square-image">
    </div>
  </div>
</section>
