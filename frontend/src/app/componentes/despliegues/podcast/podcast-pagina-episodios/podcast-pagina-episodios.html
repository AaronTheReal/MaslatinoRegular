<!-- hero.component.html -->
<section class="hero">
  <!-- Imagen de fondo rectangular que ocupa toda la pantalla (con ligera transparencia) -->
  <div class="hero-background"></div>

  <!-- Contenido principal: reducido y con espacio extra debajo -->
  <div class="content">
    
    <!-- Texto: reducido de tamaño y ocupa 50% horizontal -->
    <div class="text-container">
      <p class="description">
        Diseñado con Angular. Ahora más compacto y con espacio debajo de la imagen.
      </p>

    </div>

    <!-- Imagen cuadrada: más pequeña y con espacio hacia abajo -->
    <div class="image-container">
      <img 
        src="https://picsum.photos/id/1005/800/800" 
        alt="Imagen cuadrada de ejemplo" 
        class="square-image">
    </div>
  </div>
</section>
