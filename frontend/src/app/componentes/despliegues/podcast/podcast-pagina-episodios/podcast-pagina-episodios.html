<section class="hero">
  <!-- Imagen de fondo grande (coverImage2) con ligera transparencia -->
  <div 
    class="hero-background" 
    [style.background-image]="'url(' + (podcast?.coverImage2 || podcast?.coverImage || 'https://picsum.photos/id/1005/1920/1080') + ')'">
  </div>

  <!-- Contenido principal -->
  <div class="content">
    
    <!-- Texto dinámico -->
    <div class="text-container">
      <h1 class="title">{{ podcast?.title || 'Cargando podcast...' }}</h1>
      <p class="description">
        {{ podcast?.description || 'Descripción no disponible' }}
      </p>
    </div>

    <!-- Imagen cuadrada pequeña a la derecha (coverImage) -->
    <div class="image-container">
      <img 
        [src]="podcast?.coverImage || 'https://picsum.photos/id/1005/800/800'" 
        [alt]="podcast?.title || 'Portada del podcast'" 
        class="square-image">
    </div>
  </div>
</section>
