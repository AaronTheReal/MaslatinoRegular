<div *ngIf="error()" class="error">{{ error() }}</div>
<section class="section1">
  <!-- Contenido izquierdo -->
  <div class="contenido-izquierda">
    <h1 class="titulo">PODCAST</h1>
    <p class="subtitulo">DISPONIBLE EN</p>

    <div class="badge-group">
      <div class="badge-wrapper">
        <a (click)="openAndroid($event)">
          <img src="assets/podcasts/imagen2.png" alt="Google Play" class="badge-image"
               width="448" height="149" decoding="async">
        </a>
      </div>
      <div class="badge-wrapper">
        <a (click)="openIOS($event)">
          <img src="assets/podcasts/imagen3.png" alt="App Store" class="badge-image"
               width="471" height="167" decoding="async">
        </a>
      </div>
    </div>
  </div>

  <!-- Imagen pegada abajo-derecha (sin espacio) — es el LCP del hero -->
  <img
    src="assets/podcasts/imagen1.png"
    alt="Podcast Cover"
    class="imagen-derecha"
    width="463"
    height="536"
    loading="eager"
    fetchpriority="high"
    decoding="async">
</section>


<!-- Skeleton para Lista de Podcasts -->
<section class="more-podcasts-section" *ngIf="loading()">
  <h2 class="section-title skeleton skeleton-text" style="width: 200px; height: 34px; margin: 0 auto 60px;"></h2>
  <div class="more-podcasts-grid">
    <div class="podcast-item skeleton-item" *ngFor="let i of [1,2,3,4,5,6]">
      <div class="podcast-thumbnail skeleton skeleton-rect"></div>
      <h3 class="podcast-item-title skeleton skeleton-text" style="width: 80%; height: 18px;"></h3>
    </div>
  </div>
</section>

<!-- Lista de Podcasts real -->
<section class="more-podcasts-section" *ngIf="!loading()">
  <h2 class="section-title">PODCASTS</h2>
  <div class="more-podcasts-grid">
    <div class="podcast-item" 
         *ngFor="let podcast of podcasts(); trackBy: trackById" 
         (click)="navigateToPodcast(podcast)">
      <div class="podcast-thumbnail">
        <img [src]="podcast.coverImage" [alt]="podcast.title" class="thumbnail-image"
             loading="lazy" decoding="async">
      </div>
      <h3 class="podcast-item-title">{{ podcast.title }}</h3>
    </div>
  </div>
  <button *ngIf="hasMore()" (click)="loadMore()" class="load-more-btn">Cargar más</button>
</section>

<app-ads></app-ads>
