<section class="noticias-section">
  <div class="noticias-container">
    <h1 class="main-title">NOTICIAS</h1>

    <!-- Buscador -->
    <div class="search-container">
      <div class="search-input-wrapper">
        <svg class="search-icon" width="25" height="26" viewBox="0 0 25 26" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M15.9707 16.4993C12.7357 19.4533 7.7007 19.2263 4.7467 15.9913C1.7917 12.7563 2.0207 7.72133 5.2547 4.76733C8.4897 1.81234 13.5247 2.04033 16.4787 5.27533C19.4337 8.51033 19.2057 13.5453 15.9707 16.4993ZM18.4677 3.45933C14.3787 -1.01767 7.3137 -1.19367 3.0107 3.19133C-0.8083 7.08233 -1.0203 13.4003 2.5247 17.5433C5.7817 21.3503 11.1097 22.2613 15.3537 20.1463C16.2107 19.7193 17.2417 19.8883 17.8877 20.5953L22.1897 25.3053C22.6647 25.8253 23.4717 25.9573 24.0367 25.5363C24.6857 25.0523 24.7627 24.1283 24.2297 23.5453L19.8767 18.7793C19.2297 18.0703 19.1587 17.0263 19.6617 16.2093C22.0897 12.2703 21.7397 7.04134 18.4677 3.45933Z" fill="#B3B3B3"/>
        </svg>
        <input
          type="text"
          placeholder="Buscar por título…"
          class="search-input"
          [value]="searchQuery"
          (input)="onSearchInput($event.target?.value)"
        />
      </div>
      <button class="search-button" (click)="onSearchInput(searchQuery)">Buscar</button>
    </div>

<!-- Filtros de categoría -->
<div class="category-filters">
  <button
    *ngFor="let category of categories"
    class="category-btn"
    [class.active]="category === activeCategory"
    [style.backgroundColor]="getCategoryColor(category)"
    [style.color]="getCategoryTextColor(category)"
    [attr.aria-pressed]="category === activeCategory"
    (click)="setActiveCategory(category)">
    {{ category }}
  </button>
</div>

<app-ads></app-ads>

   <!-- Grid de noticias -->
<div class="news-grid">
  <a
    *ngFor="let n of paginatedNoticias; trackBy: trackByNoticia"
    class="news-card"
    [routerLink]="['/noticia', (n.slug || '')]">
    <div class="news-image-wrapper">
      <img [src]="getCardImage(n)" [alt]="n.meta?.imageAltGlobal || n.title" class="news-image" />
    </div>

    <div class="news-content">
      <div class="category-badges">
        <span
          class="category-badge"
          *ngFor="let cat of getCategoriesFor(n); let i = index"
          [style.backgroundColor]="getCategoryColor(cat)"
          [style.color]="getCategoryTextColor(cat)"
        >
          {{ cat }}
        </span>
      </div>

      <h2 class="news-title">{{ n.title }}</h2>

      <time class="news-date">
        {{ n.createdAt ? (n.createdAt | date: 'longDate') : '' }}
      </time>
    </div>
  </a>
</div>

    <!-- PAGINACIÓN -->
    <div class="pagination-container">
      <button class="pagination-btn nav" (click)="previousPage()" [disabled]="currentPage === 1">«</button>

      <button
        *ngFor="let page of visiblePages"
        class="pagination-btn"
        [class.active]="page === currentPage"
        (click)="goToPage(page)">
        {{ page }}
      </button>



      <button class="pagination-btn nav" (click)="nextPage()" [disabled]="currentPage === totalPages">»</button>

    </div>
  </div>
</section>
