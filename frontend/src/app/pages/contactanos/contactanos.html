<section class="seccion-contacto">
  <div class="contacto-inner">

    <!-- Encabezado general -->
    <div class="contacto-header">
      <p class="contacto-eyebrow">Ponte en contacto</p>

    </div>

    <!-- Grid principal: izquierda ubicación, derecha formulario -->
    <div class="contacto-grid">

      <!-- Panel izquierda: ubicación -->
      <div class="panel-ubicacion">
        <div class="panel-ubicacion-bg"></div>

        <div class="panel-ubicacion-content">
          <h3 class="ubicacion-titulo">Nuestra ubicación</h3>
          <p class="ubicacion-texto">
            Estamos ubicados en un punto estratégico para seguir llevando
            el sabor latino y nuestras historias a todas partes.
          </p>

          <!-- Espacio para mapa / iframe -->
          <div class="mapa-card">
            <iframe src="https://www.google.com/maps/embed?pb=!1m14!1m8!1m3!1d47126.64724685576!2d-71.104978!3d42.418891!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x89e376b643bfdd3f%3A0xa35c27c9b5be486a!2s100%20George%20P%20Hassett%20Dr%20%23105%2C%20Medford%2C%20MA%2002155!5e0!3m2!1ses-419!2sus!4v1763141397498!5m2!1ses-419!2sus" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
          </div>
        </div>
      </div>

      <!-- Panel derecha: formulario contacto -->
      <div class="panel-formulario">
        <h3 class="panel-formulario-titulo">Envíanos un mensaje</h3>
        <p class="panel-formulario-texto">
          Llena el formulario y nos pondremos en contacto contigo lo antes posible.
        </p>

        <form class="formulario-contacto">
          <div class="fila-inputs">
            <input
              type="text"
              placeholder="Nombre"
              class="input-contacto"
            />
            <input
              type="email"
              placeholder="Correo"
              class="input-contacto"
            />
          </div>

          <textarea
            placeholder="Mensaje"
            rows="6"
            class="textarea-contacto"
          ></textarea>

          <button type="submit" class="boton-contacto">
            ENVIAR
          </button>
        </form>
      </div>
    </div>
  </div>
</section>
