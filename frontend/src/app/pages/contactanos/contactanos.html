<section class="seccion-contacto">
  <div class="contacto-inner">

    <!-- Encabezado general -->
    <div class="contacto-header">
      <p class="contacto-eyebrow">Ponte en contacto</p>
    </div>

    <!-- Contenedor centrado -->
    <div class="contacto-centrado">

      <div class="panel-formulario">
        <h3 class="panel-formulario-titulo">Envíanos un mensaje</h3>
        <p class="panel-formulario-texto">
          Llena el formulario y nos pondremos en contacto contigo lo antes posible.
        </p>

        <form 
          class="formulario-contacto"
          action="https://formspree.io/f/xwpqbnrj"
          method="POST"
        >
          <div class="fila-inputs">
            <input
              type="text"
              name="name"
              placeholder="Nombre"
              class="input-contacto"
              required
            />
            <input
              type="email"
              name="email"
              placeholder="Correo"
              class="input-contacto"
              required
            />
          </div>

          <textarea
            name="message"
            placeholder="Mensaje"
            rows="6"
            class="textarea-contacto"
            required
          ></textarea>

          <button type="submit" class="boton-contacto">
            ENVIAR
          </button>
        </form>
      </div>

    </div>
  </div>
</section>
